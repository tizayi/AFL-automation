services:
  tiled:
    build:
      context: .
      dockerfile: docker/Dockerfile.tiled
    ports:
      - "8000:8000"
    environment:
      - TILED_PORT=8000
    volumes:
      - tiled-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import requests,sys; r=requests.get('http://localhost:8000/api/v1/metadata', headers={'X-Tiled-Api-Key':'devkey'}); sys.exit(0 if r.status_code in (200,401,403,404) else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "5000:5000"
    environment:
      - AFL_ORCHESTRATOR_PORT=5000
      - TILED_SERVER=http://tiled:8000
      - TILED_API_KEY=devkey
    depends_on:
      - tiled
    volumes:
      - ./docker/config/orchestrator-config.json:/root/.afl/config.json:ro
    command: ["python", "-m", "AFL.automation.orchestrator.OrchestratorDriver"]

  mixcalc:
    build:
      context: .
      dockerfile: docker/Dockerfile.mixcalc
    ports:
      - "5002:5002"
    environment:
      - AFL_MIXCALC_PORT=5002
      - TILED_SERVER=http://tiled:8000
      - TILED_API_KEY=devkey
    depends_on:
      - tiled
    volumes:
      - ./docker/config/mixcalc-config.json:/root/.afl/config.json:ro
    command: ["python", "-m", "AFL.automation.prepare.BioSANSPrepare"]

  instrument:
    build:
      context: .
      dockerfile: docker/Dockerfile.instrument
    ports:
      - "5001:5001"
    environment:
      - AFL_INSTRUMENT_PORT=5001
      - TILED_SERVER=http://tiled:8000
      - TILED_API_KEY=devkey
      - EIC_TOKEN=1
      - IPTS_NUMBER=1234
    depends_on:
      - tiled
    volumes:
      - ./docker/config/instrument-config.json:/root/.afl/config.json:ro
    command: ["python", "-m", "AFL.automation.instrument.BioSANS"]

  flex-sim:
    build:
      context: ./flex_sim
      dockerfile: Dockerfile
    ports:
      - "31950:31950"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H 'Opentrons-Version: 3' http://localhost:31950/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  flex:
    build:
      context: .
      dockerfile: docker/Dockerfile.flex
    ports:
      - "5003:5003"
    environment:
      - AFL_FLEX_PORT=5003
      - TILED_SERVER=http://tiled:8000
      - TILED_API_KEY=devkey
    depends_on:
      tiled:
        condition: service_healthy
      flex-sim:
        condition: service_healthy
    volumes:
      - ./docker/config/flex-config-sim.json:/root/.afl/config.json:ro
    command: ["python", "-m", "AFL.automation.prepare.FlexPrepare"]

volumes:
  tiled-data:
